<div class="page">
  <header class="header">
    <div class="titleBlock">
      <h1>Analytics</h1>
      <p class="subtle">Inspect dataset snapshots and stream clean outputs to Power BI.</p>
    </div>
  </header>

  <section class="card">
    <div class="cardHeader">
      <h2>Data Source</h2>
      <span class="chip">Live selector</span>
    </div>
    <div class="grid2">
      <label class="field">
        <span>Dataset</span>
        <select [(ngModel)]="selectedDataset" (ngModelChange)="onDatasetChange($event)">
          <option value="" disabled selected>Select a dataset</option>
          <option *ngFor="let d of datasets" [value]="d.id">{{ d.name }} - {{ d.id }}</option>
        </select>
      </label>

      <label class="field" *ngIf="versions.length">
        <span>Version</span>
        <select [(ngModel)]="selectedVersion" (ngModelChange)="onVersionChange($event)">
          <option value="" disabled selected>Select a version</option>
          <option *ngFor="let v of versions" [value]="v.id">v{{ v.versionNumber }} - {{ v.id }}</option>
        </select>
      </label>
    </div>
  </section>

  <section class="card" *ngIf="preview">
    <div class="cardHeader">
      <h2>Preview Output</h2>
      <span class="chip">Power BI ready</span>
    </div>
    <pre>{{ preview | json }}</pre>

    <div class="row">
      <input class="mono" style="width: 100%" [value]="powerBiUrl" readonly />
      <button class="primary" (click)="copyUrl()">Copy PowerBI URL</button>
    </div>

    <p class="subtle hint">Paste this URL into Power BI Desktop -> Get Data -> Web.</p>
  </section>
</div>
